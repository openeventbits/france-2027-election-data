name: Data check

on:
  push:
  pull_request:

jobs:
  validate-and-export:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Validate poll media discovery staging
        run: python scripts/validate_poll_media_mentions.py

      - name: Prepare poll metadata review queue
        run: python scripts/prepare_poll_metadata_review.py

      - name: Export dashboard JSON
        run: python scripts/export_dashboard_json.py

      - name: Enrich dashboard metadata review status
        run: python scripts/enrich_dashboard_poll_metadata_review_status.py

      - name: Enrich dashboard poll media discovery status
        run: python scripts/enrich_dashboard_poll_media_discovery_status.py

      - name: Ensure generated review/dashboard data is committed
        run: git diff --exit-code staging/poll_metadata_high_priority_review.csv docs/data/dashboard_sample.json
